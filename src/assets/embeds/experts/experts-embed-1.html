<style>
html,body{margin:0;height:100%;background:transparent;overflow:hidden;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
#stage{position:absolute;inset:0;display:block;overflow:hidden}
#cv{position:relative;width:1440px;height:950px;transform-origin:top left}
/* ─ full-stage screens ─ */
.scr{position:absolute;inset:0;background:#fbfbfd;opacity:0;transition:opacity .55s ease;pointer-events:none}
.scr.on{opacity:1}
.scr__bar{display:flex;align-items:center;gap:12px;height:46px;padding:0 18px;background:#f4f3f7;border-bottom:1px solid rgba(28,26,36,.07)}
.scr__dots{display:flex;gap:6px}
.scr__dots i{width:11px;height:11px;border-radius:50%;display:block}
.scr__dots i:nth-child(1){background:#f5a4a4}.scr__dots i:nth-child(2){background:#f3d38e}.scr__dots i:nth-child(3){background:#a8dcb2}
.scr__url{flex:none;width:420px;margin:0 auto;height:26px;border-radius:13px;background:#fff;border:1px solid rgba(28,26,36,.08);
  font-family:'JetBrains Mono',monospace;font-size:12px;color:#6b6684;display:flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap}
.scr__url .lock{width:8px;height:8px;border-radius:50%;background:#a8dcb2;flex:none}
.scr__view{position:absolute;top:46px;left:0;right:0;bottom:0;overflow:hidden}
.scr iframe{position:absolute;border:0;transform-origin:top left;pointer-events:none;background:#fff}
/* beat A — website (full width, proportionally centered on the expert rows) */
.scr--site iframe{width:1280px;height:1660px;transform:scale(1.125);left:0;top:-427px}
/* beat B — email compose */
.scr--mail .scr__bar{justify-content:flex-start}
.scr__mailtitle{font-size:13.5px;font-weight:700;color:#1c1a24;letter-spacing:.01em}
.mail__field{display:flex;align-items:center;gap:14px;height:52px;padding:0 26px;border-bottom:1px solid rgba(28,26,36,.06);background:#fff}
.mail__field b{font-size:13px;color:#8d88a0;font-weight:600;width:64px;flex:none}
.mail__field span{font-size:14px;color:#1c1a24;font-weight:500}
.mail__tag{display:inline-flex;align-items:center;gap:9px;background:#f1eff6;border-radius:999px;padding:4px 14px 4px 5px;font-size:13px}
.mail__tag img{width:24px;height:24px;border-radius:50%;object-fit:cover;display:block}
.mail__body{position:absolute;top:150px;left:0;right:0;bottom:0;background:#fff;padding:26px 30px 92px}
.mail__line{font-size:15px;color:#1c1a24;min-height:24px;font-weight:500;max-width:720px;line-height:1.6}
.mail__line .caret{display:inline-block;width:2px;height:17px;background:#9887f4;vertical-align:-2px;margin-left:1px;opacity:0}
.mail__line .caret.on{opacity:1;animation:blink .85s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.mail__block{position:relative;margin-top:18px;width:616px;height:560px;border-radius:14px;overflow:hidden;border:1px solid rgba(28,26,36,.08);
  box-shadow:0 18px 44px -16px rgba(28,26,36,.22);opacity:0;transform:translateY(26px) scale(.97)}
.mail__block.in{animation:blockIn .6s cubic-bezier(.2,1.1,.35,1) forwards}
@keyframes blockIn{to{opacity:1;transform:none}}
.mail__block iframe{width:760px;height:732px;transform:scale(.81);left:0;top:-12px}
/* bottom action row: Send + REAL Magic Write + Embed option */
.mail__actions{position:absolute;left:30px;bottom:24px;display:flex;align-items:center;gap:14px}
.mail__send{position:relative;display:inline-flex;align-items:center;justify-content:center;height:48px;min-width:124px;border-radius:999px;
  background:linear-gradient(135deg,#9887f4,#c18cff);color:#fff;font-size:15px;font-weight:700;font-family:inherit;border:0;
  box-shadow:0 12px 28px -8px rgba(152,135,244,.55);transition:transform .18s ease,box-shadow .18s ease;overflow:hidden}
.mail__send .st{position:absolute;inset:0;display:inline-flex;align-items:center;justify-content:center;gap:9px;transition:opacity .3s ease,transform .3s ease}
.mail__send .st svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.mail__send .st--sent{opacity:0;transform:translateY(10px)}
.mail__send.sent .st--send{opacity:0;transform:translateY(-10px)}
.mail__send.sent .st--sent{opacity:1;transform:none}
.mail__send.hit{transform:scale(.94);box-shadow:0 0 0 6px rgba(152,135,244,.25)}
/* CANONICAL Magic Write (DS_Carly §40 v3, lifted from app-shell-carly-dash-interactive):
   glossy body + 1.5px conic-gradient rim via ::after mask-composite:exclude + 4-point star.
   Lavender glossy body (the §40 circle-trigger recipe) so it reads on the white compose UI. */
.btn-magic{position:relative;isolation:isolate;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 24px;height:48px;border-radius:999px;
  color:#fff;font-size:14px;font-weight:700;font-family:inherit;white-space:nowrap;border:1.5px solid transparent;background-clip:padding-box;
  background:radial-gradient(ellipse 100% 65% at 50% -25%,rgba(255,255,255,.22) 0%,transparent 65%),linear-gradient(180deg,rgba(48,42,72,.96) 0%,rgba(28,26,36,.97) 100%);
  backdrop-filter:blur(8px) saturate(150%);-webkit-backdrop-filter:blur(8px) saturate(150%);
  box-shadow:inset 0 1.5px 0 rgba(255,255,255,.28),inset 0 -0.5px 0 rgba(255,255,255,.10),0 8px 20px -6px rgba(28,26,36,.4);
  transition:transform .25s ease,box-shadow .25s ease}
.btn-magic::after{content:'';position:absolute;inset:0;border-radius:inherit;padding:1.5px;
  background:conic-gradient(from 45deg,#c18cff,#ff719c,#ffd26d,#c18cff);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:-1}
.btn-magic svg{width:15px;height:15px;flex-shrink:0}
.btn-magic.drafting svg{animation:cyMwSpin 2.4s linear infinite}
.btn-magic.hit{transform:scale(.94);box-shadow:0 0 0 5px rgba(193,140,255,.28),inset 0 1.5px 0 rgba(255,255,255,.65)}
@keyframes cyMwSpin{to{transform:rotate(360deg)}}
/* CANONICAL DS_Carly §40.4 Magic Write drafting skeleton — dark-glass, white shimmer bands */
.mw-skel{position:absolute;top:26px;left:30px;width:720px;padding:16px 20px 12px;border-radius:14px;box-sizing:border-box;
  background:rgba(30,24,52,.92);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  opacity:0;transform:translateY(8px);transition:opacity .35s ease,transform .35s ease;pointer-events:none}
.mw-skel.on{opacity:1;transform:none}
.carly-magic-skeleton-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.10)}
.carly-magic-skeleton-header svg{width:14px;height:14px;color:#fff;flex-shrink:0;animation:cyMwSpin 2.4s linear infinite}
.carly-magic-skeleton-header span{font-size:11px;font-weight:700;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:.3px;text-transform:uppercase}
.carly-magic-skeleton-line{height:11px;margin-bottom:10px;border-radius:5px;
  background:linear-gradient(90deg,rgba(255,255,255,.06) 0%,rgba(255,255,255,.18) 40%,rgba(255,255,255,.08) 60%,rgba(255,255,255,.04) 100%);
  background-size:400px 100%;animation:carlyMagicShimmer 1.5s ease-in-out infinite}
.carly-magic-skeleton-line:nth-child(2){animation-delay:.12s}
.carly-magic-skeleton-line:nth-child(3){animation-delay:.24s}
.carly-magic-skeleton-line:nth-child(4){animation-delay:.36s}
@keyframes carlyMagicShimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
/* drafted text resolves in (canonical: skeleton -> filled field) */
.mail__line{opacity:0;transition:opacity .5s ease}
.mail__line.in{opacity:1}
/* Embed booking system option (same pill family) */
.btn-embed{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 24px;height:48px;border-radius:999px;color:#fff;font-size:14px;font-weight:700;font-family:inherit;
  background:radial-gradient(ellipse 100% 65% at 50% -25%,rgba(255,255,255,.22) 0%,transparent 65%),linear-gradient(180deg,rgba(48,42,72,.96) 0%,rgba(28,26,36,.97) 100%);
  backdrop-filter:blur(8px) saturate(150%);-webkit-backdrop-filter:blur(8px) saturate(150%);
  border:1px solid rgba(255,255,255,.16);white-space:nowrap;
  box-shadow:inset 0 1.5px 0 rgba(255,255,255,.28),inset 0 -0.5px 0 rgba(255,255,255,.10),0 8px 20px -6px rgba(28,26,36,.4);
  transition:transform .18s ease,box-shadow .18s ease}
.btn-embed svg{width:15px;height:15px;fill:none;stroke:#c8b8ff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-embed.hit{transform:scale(.94);box-shadow:0 0 0 5px rgba(152,135,244,.25),inset 0 1.5px 0 rgba(255,255,255,.28)}
/* beat C — ghost case study + launcher + widget */
.g{position:absolute;border-radius:9px;background:#f5f5f5}
.g--kick{background:#f5f5f5}
.g--img{background:#f5f5f5;border-radius:16px}
.fab{position:absolute;left:986px;bottom:42px;display:flex;align-items:center;gap:12px;height:66px;padding:0 22px 0 10px;border-radius:999px;background:#fff;
  box-shadow:0 22px 50px -16px rgba(28,26,36,.35),0 8px 20px -8px rgba(28,26,36,.2);border:1px solid rgba(28,26,36,.06);
  opacity:0;transform:translateY(18px) scale(.9);transition:opacity .45s ease,transform .45s cubic-bezier(.2,1.2,.4,1)}
.fab.in{opacity:1;transform:none}
.fab.out{opacity:0;transform:scale(.6);transition:opacity .3s ease,transform .3s ease}
.fab.hit{transform:scale(.94)}
.fab__av{position:relative;width:46px;height:46px;flex:none}
.fab__av img{width:46px;height:46px;border-radius:50%;object-fit:cover;display:block;border:2px solid rgba(152,135,244,.55)}
.fab__av i{position:absolute;right:1px;bottom:1px;width:11px;height:11px;border-radius:50%;background:#22c55e;border:2px solid #fff}
.fab__tx b{display:block;font-size:14px;color:#1c1a24;font-weight:700;line-height:1.2}
.fab__tx small{font-size:12px;color:#6b6684;font-weight:500}
.pop{position:absolute;left:920px;bottom:30px;width:306px;height:539px;border-radius:21px;overflow:hidden;
  box-shadow:0 40px 90px -22px rgba(28,26,36,.42),0 14px 34px -12px rgba(28,26,36,.24);opacity:0;transform-origin:80% 100%}
.pop iframe{width:1280px;height:800px;transform:scale(.85);transform-origin:top left;left:-762px;top:-122px;position:absolute}
.pop.in{animation:popIn .6s cubic-bezier(.2,1.45,.4,1) forwards}
@keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
/* ─ DS5 n-cursor — FILLED (light theme: fill charcoal) ─ */
.n-cursor{position:absolute;z-index:30;width:44px;height:44px;opacity:0;pointer-events:none;
  filter:drop-shadow(0 4px 8px rgba(28,26,36,.22)) drop-shadow(0 1px 2px rgba(28,26,36,.16));
  transition:left 1.15s cubic-bezier(.45,.05,.25,1),top 1.15s cubic-bezier(.45,.05,.25,1),opacity .35s ease,transform .18s ease}
.n-cursor svg{width:100%;height:100%;display:block}
.n-cursor svg path{fill:#1c1a24;stroke:none}
.n-cursor.click{transform:scale(.82)}
/* click ring */
.ring{position:absolute;z-index:25;width:20px;height:20px;border-radius:50%;pointer-events:none;opacity:0;transform:translate(-50%,-50%)}
.ring.go{animation:ringGo .55s ease-out forwards}
@keyframes ringGo{from{opacity:.85;box-shadow:0 0 0 0 rgba(152,135,244,.55)}to{opacity:0;box-shadow:0 0 0 26px rgba(152,135,244,0)}}
/* reduced motion → resolved end state (widget beat) */
@media (prefers-reduced-motion: reduce){
  .scr{transition:none;opacity:0!important}
  #cv[data-static] .scr--case{opacity:1!important}
  #cv[data-static] .pop{opacity:1!important;transform:none!important;animation:none}
  .n-cursor,.fab{display:none}
}
</style></head><body>

<script>
if(!window.DecompressionStream){document.body.innerHTML='<div style="font-family:sans-serif;padding:40px;color:#6b6684">Please open in a current version of Chrome, Edge or Safari to view the showcase.</div>';}
else{(function(){
var stage=document.getElementById('stage'),cv=document.getElementById('cv');
var mq=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
async function gunzip(b64){var bin=atob(b64);var u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);var st=new Blob([u]).stream().pipeThrough(new DecompressionStream('gzip'));return await new Response(st).text();}
function fit(){var sc=stage.clientWidth/1440;var H=Math.max(700,Math.min(1160,Math.round(stage.clientHeight/sc)));cv.style.height=H+'px';cv.style.transform='scale('+sc+')';sizeBlock();}
function cvH(){return parseInt(cv.style.height)||950;}
function sizeBlock(){var w=document.getElementById('blockWrap');if(!w)return;var sc2=Math.min(1,(cvH()-390)/560);w.style.transform='scale('+sc2+')';}
window.addEventListener('resize',fit);fit();
var scrs=[].slice.call(document.querySelectorAll('.scr'));
var cur=document.getElementById('cur'),ring=document.getElementById('ring');
var typed=document.getElementById('typed'),mailLine=document.getElementById('mailLine'),mwSkel=document.getElementById('mwSkel'),mailBlock=document.getElementById('mailBlock');
var magicBtn=document.getElementById('magicBtn'),embedBtn=document.getElementById('embedBtn'),sendBtn=document.getElementById('sendBtn');
var fab=document.getElementById('fab'),pop=document.getElementById('popCard');
var FR={};
var TXT='Hi Tina — thank you for the thoughtful questions on Tuesday’s call. Rather than sending another deck, I’d like you to hear how this decision played out for teams that were exactly where Udemy is today. Below, you can pick a time that suits you and speak directly with one of our customers — unscripted, and without anyone from our side on the line. Their calendars are live, so feel free to grab whichever slot works best.';
var timers=[],token=0,beatT=null;
function later(fn,ms){timers.push(setTimeout(fn,ms));}
function beat(i){scrs.forEach(function(s){s.classList.remove('on');});clearTimeout(beatT);if(i<0)return;beatT=setTimeout(function(){scrs[i].classList.add('on');},520);}
function curTo(x,y,show){if(show!==false)cur.style.opacity='1';cur.style.left=(x-6)+'px';cur.style.top=(y-4)+'px';}
function click(my,x,y,el){later(function(){if(my!==token)return;
  cur.classList.add('click');ring.style.left=x+'px';ring.style.top=y+'px';ring.classList.remove('go');void ring.offsetWidth;ring.classList.add('go');
  if(el)el.classList.add('hit');},0);
  later(function(){if(my!==token)return;cur.classList.remove('click');if(el)el.classList.remove('hit');},260);}
/* in-iframe FX on the REAL components (same-origin srcdoc) */
function inDoc(k){try{return FR[k].contentDocument;}catch(e){return null;}}
function injectFx(k){var d=inDoc(k);if(!d||d.getElementById('epfx'))return;
  var st=d.createElement('style');st.id='epfx';
  st.textContent='.epfx-press{transform:scale(.94)!important;filter:brightness(.93);transition:transform .18s ease!important}'+
  '.epfx-sel{box-shadow:inset 0 0 0 1.8px #9887f4!important;background:rgba(152,135,244,.14)!important;border-radius:10px;transition:box-shadow .2s ease,background .2s ease}';
  d.head.appendChild(st);}
function fx(k,sel,idx,cls,ms,my){var d=inDoc(k);if(!d)return;var els=d.querySelectorAll(sel);var el=els[idx||0];if(!el)return;
  el.classList.add(cls);if(ms)timers.push(setTimeout(function(){if(my===token)el.classList.remove(cls);},ms));}
function fxClear(k,sel,cls){var d=inDoc(k);if(!d)return;[].slice.call(d.querySelectorAll(sel)).forEach(function(e){e.classList.remove(cls);});}

function reset(){beat(-1);cur.style.opacity='0';cur.style.transition='none';curTo(720,930,false);void cur.offsetWidth;cur.style.transition='';
  typed.textContent='';mailLine.classList.remove('in');mwSkel.classList.remove('on');magicBtn.classList.remove('drafting');mailBlock.classList.remove('in');sendBtn.classList.remove('sent');
  fab.classList.remove('in','out','hit');pop.classList.remove('in');
  fxClear('popup','[data-class="bs-time-slot"]','epfx-sel');}
function play(){
  var my=++token;timers.forEach(clearTimeout);timers=[];reset();
  if(mq){cv.setAttribute('data-static','');pop.classList.add('in');return;}
  cv.removeAttribute('data-static');
  /* ── BEAT A · website ── */
  later(function(){if(my!==token)return;beat(0);},300);
  later(function(){if(my!==token)return;curTo(1280,252);},1700);
  later(function(){if(my!==token)return;click(my,1280,252);fx('wbs','[data-class="bs-book-btn"]',0,'epfx-press',320,my);},3050);
  later(function(){if(my!==token)return;cur.style.opacity='0';},5300);
  /* ── BEAT B · email ── */
  later(function(){if(my!==token)return;beat(1);curTo(720,930,false);},5800);
  later(function(){if(my!==token)return;curTo(246,cvH()-48);},6700);
  later(function(){if(my!==token)return;click(my,246,cvH()-48,magicBtn);},7900);
  /* canonical §40.4 drafting: star spins + dark-glass skeleton shimmers, then the draft resolves */
  later(function(){if(my!==token)return;magicBtn.classList.add('drafting');mwSkel.classList.add('on');},8200);
  later(function(){if(my!==token)return;mwSkel.classList.remove('on');magicBtn.classList.remove('drafting');},10850);
  later(function(){if(my!==token)return;typed.textContent=TXT;mailLine.classList.add('in');},11150);
  later(function(){if(my!==token)return;curTo(470,cvH()-48);},11550);
  later(function(){if(my!==token)return;click(my,470,cvH()-48,embedBtn);},12650);
  later(function(){if(my!==token)return;mailBlock.classList.add('in');},13000);
  later(function(){if(my!==token)return;curTo(92,cvH()-48);},14250);
  later(function(){if(my!==token)return;click(my,92,cvH()-48,sendBtn);},15350);
  later(function(){if(my!==token)return;sendBtn.classList.add('sent');},15650);
  later(function(){if(my!==token)return;cur.style.opacity='0';},16550);
  /* ── BEAT C · widget ── */
  later(function(){if(my!==token)return;beat(2);curTo(720,930,false);},17050);
  later(function(){if(my!==token)return;fab.classList.add('in');},17900);
  later(function(){if(my!==token)return;curTo(1100,cvH()-75);},18450);
  later(function(){if(my!==token)return;click(my,1100,cvH()-75,fab);},19650);
  later(function(){if(my!==token)return;fab.classList.add('out');pop.classList.add('in');},19950);
  later(function(){if(my!==token)return;curTo(1073,cvH()-196);},20750);
  later(function(){if(my!==token)return;click(my,1073,cvH()-196);fx('popup','[data-class="bs-time-slot"]',0,'epfx-sel',0,my);},21850);
  later(function(){if(my!==token)return;curTo(1073,cvH()-113);},22550);
  later(function(){if(my!==token)return;click(my,1073,cvH()-113);fx('popup','[data-class="bs-book-btn"]',0,'epfx-press',320,my);},23650);
  later(function(){if(my!==token)return;cur.style.opacity='0';},26050);
  later(function(){if(my!==token)return;play();},27850);
}
(async function(){
  var B=JSON.parse(document.getElementById('blobs').textContent);
  var frames=[].slice.call(document.querySelectorAll('iframe[data-k]'));
  await Promise.all(frames.map(async function(f){
    var k=f.getAttribute('data-k');FR[k]=f;
    f.addEventListener('load',function(){injectFx(k);});
    f.srcdoc=await gunzip(B[k]);
  }));
  setTimeout(play,150);
})();
window.addEventListener('message',function(e){var d=e.data;if(d&&(d.ep==='epPlay'||d.cz==='czSetActive'))play();});
})();}
