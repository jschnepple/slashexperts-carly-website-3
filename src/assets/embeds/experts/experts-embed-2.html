<style>
html,body{margin:0;height:100%;background:transparent;overflow:hidden;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
#stage{position:absolute;inset:0;display:block;overflow:hidden}
#cv{position:relative;width:1440px;height:950px;transform-origin:top left}
/* full-stage app screens (no browser chrome — these ARE the app) */
.scr{position:absolute;inset:0;background:#fbfbfd;opacity:0;transition:opacity .55s ease;pointer-events:none;overflow:hidden}
.scr.on{opacity:1}
.scr iframe{position:absolute;border:0;left:0;top:0;width:100%;height:100%;pointer-events:none;background:#fff}
/* DS5 FILLED n-cursor (light theme) */
.n-cursor{position:absolute;z-index:30;width:44px;height:44px;opacity:0;pointer-events:none;
  filter:drop-shadow(0 4px 8px rgba(28,26,36,.22)) drop-shadow(0 1px 2px rgba(28,26,36,.16));
  transition:left 1.15s cubic-bezier(.45,.05,.25,1),top 1.15s cubic-bezier(.45,.05,.25,1),opacity .35s ease,transform .18s ease}
.n-cursor svg{width:100%;height:100%;display:block}
.n-cursor svg path{fill:#1c1a24;stroke:none}
.n-cursor.click{transform:scale(.82)}
.ring{position:absolute;z-index:25;width:20px;height:20px;border-radius:50%;pointer-events:none;opacity:0;transform:translate(-50%,-50%)}
.ring.go{animation:ringGo .55s ease-out forwards}
@keyframes ringGo{from{opacity:.85;box-shadow:0 0 0 0 rgba(152,135,244,.55)}to{opacity:0;box-shadow:0 0 0 26px rgba(152,135,244,0)}}
@media (prefers-reduced-motion: reduce){
  .scr{transition:none;opacity:0!important}
  #cv[data-static] .scr--meet{opacity:1!important}
  .n-cursor{display:none}
}
</style></head><body>

<script>
if(!window.DecompressionStream){document.body.innerHTML='<div style="font-family:sans-serif;padding:40px;color:#6b6684">Please open in a current version of Chrome, Edge or Safari to view the showcase.</div>';}
else{(function(){
var stage=document.getElementById('stage'),cv=document.getElementById('cv');
var mq=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
async function gunzip(b64){var bin=atob(b64);var u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);var st=new Blob([u]).stream().pipeThrough(new DecompressionStream('gzip'));return await new Response(st).text();}
function fit(){var sc=stage.clientWidth/1440;var H=Math.max(700,Math.min(1160,Math.round(stage.clientHeight/sc)));cv.style.height=H+'px';cv.style.transform='scale('+sc+')';}
window.addEventListener('resize',fit);fit();
var scrs=[].slice.call(document.querySelectorAll('.scr'));
var cur=document.getElementById('cur'),ring=document.getElementById('ring');
var FR={},timers=[],token=0,beatT=null;
function later(fn,ms){timers.push(setTimeout(fn,ms));}
function beat(i){scrs.forEach(function(s){s.classList.remove('on');});clearTimeout(beatT);if(i<0)return;beatT=setTimeout(function(){scrs[i].classList.add('on');},520);}
function curTo(x,y,show){if(show!==false)cur.style.opacity='1';cur.style.left=(x-6)+'px';cur.style.top=(y-4)+'px';}
function click(my,x,y){later(function(){if(my!==token)return;
  cur.classList.add('click');ring.style.left=x+'px';ring.style.top=y+'px';ring.classList.remove('go');void ring.offsetWidth;ring.classList.add('go');},0);
  later(function(){if(my!==token)return;cur.classList.remove('click');},260);}
function inDoc(k){try{return FR[k].contentDocument;}catch(e){return null;}}
function injectFx(k){var d=inDoc(k);if(!d||d.getElementById('epfx'))return;
  var st=d.createElement('style');st.id='epfx';
  st.textContent='.epfx-press{transform:scale(.94)!important;filter:brightness(.93);transition:transform .18s ease!important}'+
  '.epfx-sync{box-shadow:inset 3px 0 0 #9887f4, inset 0 0 0 1.5px rgba(152,135,244,.35)!important;background:rgba(152,135,244,.07)!important;transition:box-shadow .35s ease,background .35s ease}';
  d.head.appendChild(st);}
/* beat-1 helpers — the REAL Freshsales card */
function freshCard(){var d=inDoc('in001');if(!d)return null;
  var cards=[].slice.call(d.querySelectorAll('[data-class="integration-card"]'));
  for(var i=0;i<cards.length;i++){if(cards[i].textContent.indexOf('Freshsales')>-1)return cards[i];}return null;}
function pressConnect(my){var c=freshCard();if(!c)return;var b=c.querySelector('[data-class="int-action-btn"]');
  if(b){b.classList.add('epfx-press');timers.push(setTimeout(function(){if(my===token)b.classList.remove('epfx-press');},320));}}
var freshActionsOrig=null;
function flipConnected(){var c=freshCard();if(!c)return;
  c.setAttribute('data-state','connected');
  /* swap action row to the REAL connected controls (cloned from the Salesforce card) */
  var acts=c.querySelector('[data-class="integration-actions"]');
  if(acts){if(freshActionsOrig===null)freshActionsOrig=acts.innerHTML;
    var d=inDoc('in001');var cards=[].slice.call(d.querySelectorAll('[data-class="integration-card"]'));
    for(var i=0;i<cards.length;i++){if(cards[i].textContent.indexOf('Salesforce')>-1){
      var sfActs=cards[i].querySelector('[data-class="integration-actions"]');
      if(sfActs)acts.innerHTML=sfActs.innerHTML;break;}}}
  var ind=c.querySelector('[data-class="status-indicator"]');
  if(ind){ind.setAttribute('data-state','connected');
    for(var n=0;n<ind.childNodes.length;n++){if(ind.childNodes[n].nodeType===3&&ind.childNodes[n].nodeValue.trim()){ind.childNodes[n].nodeValue='Connected';}}
    // some builds keep the label in a nested span
    [].slice.call(ind.querySelectorAll('*')).forEach(function(el){if(el.getAttribute('data-class')!=='status-dot'&&el.textContent.trim().toLowerCase()==='not connected')el.textContent='Connected';});
    if(ind.textContent.trim().toLowerCase().indexOf('connected')===-1){}
  }}
function unflip(){var c=freshCard();if(!c)return;c.setAttribute('data-state','disconnected');
  var acts=c.querySelector('[data-class="integration-actions"]');
  if(acts&&freshActionsOrig!==null)acts.innerHTML=freshActionsOrig;
  var ind=c.querySelector('[data-class="status-indicator"]');
  if(ind){ind.setAttribute('data-state','disconnected');
    for(var n=0;n<ind.childNodes.length;n++){if(ind.childNodes[n].nodeType===3&&ind.childNodes[n].nodeValue.trim()){ind.childNodes[n].nodeValue='Not Connected';}}
    [].slice.call(ind.querySelectorAll('*')).forEach(function(el){if(el.getAttribute('data-class')!=='status-dot'&&el.textContent.trim().toLowerCase()==='connected')el.textContent='Not Connected';});}}
/* beat-1b — the page's REAL Connect Freshsales modal + fake login */
function freshModal(){var d=inDoc('in001');if(!d)return null;
  var os=[].slice.call(d.querySelectorAll('[data-class="modal-overlay"]'));
  for(var i=0;i<os.length;i++){if(os[i].textContent.indexOf('Connect Freshsales CRM')>-1)return os[i];}return null;}
function freshInputs(){var m=freshModal();return m?[].slice.call(m.querySelectorAll('input[data-class="form-input"]')):[];}
function freshConnectBtn(){var m=freshModal();if(!m)return null;
  var bs=[].slice.call(m.querySelectorAll('[data-class="modal-btn"]'));
  for(var i=0;i<bs.length;i++){if(bs[i].textContent.trim()==='Connect')return bs[i];}return bs[bs.length-1]||null;}
function elXY(el){if(!el)return null;var r=el.getBoundingClientRect();return {x:r.left+Math.min(r.width*0.5,180),y:r.top+r.height/2};}
function typeVal(my,el,text,t0,per){if(!el)return;var i=0;
  function step(){if(my!==token)return;el.value=text.slice(0,++i);if(i<text.length)timers.push(setTimeout(step,per));}
  later(step,t0);}
/* beat-2 helpers — the REAL Meetings row + details modal */
function firstRow(){var d=inDoc('mt001');if(!d)return null;var tb=d.querySelector('tbody');if(!tb)return null;var trs=tb.querySelectorAll('tr');return trs[1]||trs[0];} /* Victoria Willis row — matches the real details modal */
function detailsModal(){var d=inDoc('mt001');if(!d)return null;return d.querySelector('[aria-labelledby="detailsModalTitle"]');}
function reset(){beat(-1);cur.style.opacity='0';cur.style.transition='none';curTo(720,800,false);void cur.offsetWidth;cur.style.transition='';
  unflip();var fm=freshModal();if(fm)fm.setAttribute('data-state','hidden');
  freshInputs().forEach(function(inp){inp.value='';});
  var r=firstRow();if(r)r.classList.remove('epfx-sync');var m=detailsModal();if(m)m.setAttribute('data-state','closed');}
function play(){
  var my=++token;timers.forEach(clearTimeout);timers=[];reset();
  if(mq){cv.setAttribute('data-static','');var m=detailsModal();if(m)m.setAttribute('data-state','open');return;}
  cv.removeAttribute('data-static');
  /* ── BEAT 1 · Integrations: click Connect → REAL credentials modal → fake login ── */
  later(function(){if(my!==token)return;beat(0);},300);
  later(function(){if(my!==token)return;curTo(1228,676);},1700);
  later(function(){if(my!==token)return;click(my,1228,676);pressConnect(my);},3050);
  later(function(){if(my!==token)return;var fm=freshModal();if(fm)fm.setAttribute('data-state','visible');},3400);
  later(function(){if(my!==token)return;var p=elXY(freshInputs()[0]);if(p)curTo(p.x,p.y);},4300);
  later(function(){if(my!==token)return;var p=elXY(freshInputs()[0]);if(p)click(my,p.x,p.y);},5300);
  later(function(){if(my!==token)return;typeVal(my,freshInputs()[0],'https://acme.freshsales.io/api',0,26);},5500);
  later(function(){if(my!==token)return;var p=elXY(freshInputs()[1]);if(p)curTo(p.x,p.y);},6500);
  later(function(){if(my!==token)return;var p=elXY(freshInputs()[1]);if(p)click(my,p.x,p.y);},7400);
  later(function(){if(my!==token)return;typeVal(my,freshInputs()[1],'fs_live_Xq92kA7bDr41mZ',0,30);},7600);
  later(function(){if(my!==token)return;var p=elXY(freshConnectBtn());if(p)curTo(p.x,p.y);},8700);
  later(function(){if(my!==token)return;var b=freshConnectBtn(),p=elXY(b);if(p){click(my,p.x,p.y);}if(b){b.classList.add('epfx-press');timers.push(setTimeout(function(){if(my===token)b.classList.remove('epfx-press');},320));}},9700);
  later(function(){if(my!==token)return;var fm=freshModal();if(fm)fm.setAttribute('data-state','hidden');},10150);
  later(function(){if(my!==token)return;flipConnected();},10400);
  later(function(){if(my!==token)return;cur.style.opacity='0';},12300);
  /* ── BEAT 2 · Meetings: the booking lands on the record ── */
  later(function(){if(my!==token)return;beat(1);curTo(720,800,false);},13000);
  later(function(){if(my!==token)return;var r=firstRow();if(r)r.classList.add('epfx-sync');},14400);
  later(function(){if(my!==token)return;curTo(620,693);},15000);
  later(function(){if(my!==token)return;click(my,620,693);},16200);
  later(function(){if(my!==token)return;var m=detailsModal();if(m)m.setAttribute('data-state','open');},16600);
  later(function(){if(my!==token)return;cur.style.opacity='0';},18300);
  later(function(){if(my!==token)return;play();},28500);
}
(async function(){
  var B=JSON.parse(document.getElementById('blobs').textContent);
  var frames=[].slice.call(document.querySelectorAll('iframe[data-k]'));
  await Promise.all(frames.map(async function(f){
    var k=f.getAttribute('data-k');FR[k]=f;
    f.addEventListener('load',function(){injectFx(k);});
    f.srcdoc=await gunzip(B[k]);
  }));
  setTimeout(play,150);
})();
window.addEventListener('message',function(e){var d=e.data;if(d&&(d.ep==='epPlay'||d.cz==='czSetActive'))play();});
})();}
