<script>
  const DWELL=[5200,5600,6200,6600];
  const scenes=[...document.querySelectorAll('.scene')];
  const dots=[...document.querySelectorAll('#dots .dot')];
  const traveler=document.getElementById('traveler');
  const ctitle=document.getElementById('ctitle'),csub=document.getElementById('csub');
  const SCALE=1038/1180;
  const POS=[[129,177,38],[360,144,27],[424,314,92],[100,165,36]];
  const STORY=[
    {t:'Connects to your pipeline', s:'Carly plugs into your CRM and watches every open opportunity, live.'},
    {t:'Reads each deal', s:'The stage, the stakeholders, the sentiment, and what the buyer needs to move.'},
    {t:'Picks the proof', s:"The best-fit expert, reference, or story for that account's exact question, drawn from your Experts+ network."},
    {t:'Delivers and reports back', s:"She gets the proof in front of the right person the moment it lands, then tells your team what happened and what's next."}
  ];
  let idx=-1,timer=null;
  function words(str,off){var out=[],idx=off||0;str.split(' ').forEach(function(w){if(w==='')return;out.push('<span class="w" style="--i:'+idx+'">'+w+'</span>');idx++;});return {html:out.join(' '),n:idx};}
  function renderTitle(i){var d=STORY[i];var T=words(d.t,1),S=words(d.s,T.n+1);if(ctitle)ctitle.innerHTML='<span class="tnum w" style="--i:0">0'+(i+1)+'</span>'+T.html;if(csub)csub.innerHTML=S.html;}
  function moveCarly(i){if(!traveler)return;var p=POS[i];traveler.style.opacity='1';traveler.style.left=(p[0]*SCALE)+'px';traveler.style.top=(p[1]*SCALE)+'px';traveler.style.width=(p[2]*SCALE)+'px';traveler.style.height=(p[2]*SCALE)+'px';}
  scenes.forEach(function(ifr){ifr.addEventListener('load',function(){try{var d=ifr.contentDocument;var a=d.querySelector('.carly-anchor');if(a)a.style.visibility='hidden';var c=d.querySelector('.cap');if(c)c.style.display='none';}catch(e){}});});
  function play(i){
    if(i===idx)return;idx=i;
    scenes.forEach((s,j)=>s.classList.toggle('on',j===i));
    dots.forEach((d,j)=>d.classList.toggle('on',j===i));
    try{if(scenes[i].__seen){scenes[i].contentWindow.location.reload();}scenes[i].__seen=1;}catch(e){}
    moveCarly(i);renderTitle(i);
    clearTimeout(timer);timer=setTimeout(()=>play((i+1)%scenes.length),DWELL[i]);
  }
  dots.forEach((d,i)=>d.addEventListener('click',()=>play(i)));
  play(0);
</script>
